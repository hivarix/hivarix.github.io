<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About HiVaRiX</title>

<link rel="icon" href="https://commons.wikimedia.org/wiki/Special:FilePath/HiVaRiX.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --brand:#003366;
  --accent:#ffd700;
  --text:#1b1b1b;
  --muted:rgba(0,0,0,0.6);
}

body{
  margin:0;
  font-family:'Segoe UI', system-ui, sans-serif;
  background:#f6f8fc;
  color:var(--text);
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 24px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(0,0,0,0.06);
  transition:0.35s ease;
}

nav img{
  height:68px;
  transition:0.3s;
}

/* SCROLLED NAV */
nav.scrolled{
  background:rgba(255,255,255,0.95);
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  padding:10px 24px;
}

nav.scrolled img{
  height:56px;
}

nav.hide{
  transform:translateY(-100%);
}

/* MENU */
.menu{
  display:flex;
  align-items:center;
  gap:20px;
}

.menu a{
  text-decoration:none;
  color:var(--brand);
  font-weight:600;
  position:relative;
}

.menu a.active{
  color:var(--accent);
}

/* HAMBURGER */
.hamburger{
  display:none;
  flex-direction:column;
  cursor:pointer;
  gap:5px;
}

.hamburger span{
  width:26px;
  height:3px;
  background:var(--brand);
  border-radius:3px;
  transition:0.3s;
}

.hamburger.active span:nth-child(1){
  transform:rotate(45deg) translate(5px,5px);
}

.hamburger.active span:nth-child(2){
  opacity:0;
}

.hamburger.active span:nth-child(3){
  transform:rotate(-45deg) translate(6px,-6px);
}

/* MOBILE MENU */
@media(max-width:768px){

  .hamburger{
    display:flex;
  }

  .menu{
    position:absolute;
    top:80px;
    right:20px;
    background:#fff;
    flex-direction:column;
    width:220px;
    padding:20px;
    border-radius:12px;
    box-shadow:0 20px 40px rgba(0,0,0,0.1);

    opacity:0;
    transform:translateY(-10px);
    pointer-events:none;
    transition:0.3s ease;
  }

  .menu.show{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }
}

/* HERO */
header{
  height:70vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px;
  background:
    linear-gradient(120deg, rgba(0,0,0,0.75), rgba(0,0,0,0.35)),
    url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f') center/cover;
  color:#fff;
}

h1{
  font-size:54px;
}

section{
  padding:90px 20px;
  text-align:center;
  max-width:1000px;
  margin:auto;
}

h2{
  color:var(--brand);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:#fff;
  padding:25px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* CTA */
.cta{
  background:linear-gradient(135deg,var(--brand),#001a33);
  color:#fff;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:14px 28px;
  border-radius:30px;
  background:var(--accent);
  color:#000;
  text-decoration:none;
}

/* FOOTER */
footer{
  background:#081523;
  color:#fff;
  text-align:center;
  padding:60px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

footer img{
  height:70px;
}

.socials a{
  color:#fff;
  margin:0 10px;
}

</style>
</head>

<body>

<!-- NAV -->
<nav id="navbar">
  <a href="/">
    <img src="https://commons.wikimedia.org/wiki/Special:FilePath/HiVaRiX.png">
  </a>

  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="menu" id="menu">
    <a href="/">Home</a>
    <a href="https://hivarix.com/services">Services</a>
    <a href="https://hivarix.com/about" class="active">About</a>
  </div>
</nav>

<header>
  <div>
    <h1>About HiVaRiX</h1>
    <p>We are building brands that dominate globally.</p>
  </div>
</header>

<section>
  <h2>Who We Are</h2>
  <p>HiVaRiX is a global branding and strategy company.</p>
</section>

<footer>
  <img src="https://commons.wikimedia.org/wiki/Special:FilePath/HiVaRiX.png">
  <p>© 2026 HiVaRiX Global</p>
</footer>

<!-- ELITE SCRIPT -->
<script>
const nav = document.getElementById("navbar");
const hamburger = document.getElementById("hamburger");
const menu = document.getElementById("menu");

let lastScroll = 0;

window.addEventListener("scroll", () => {
  const currentScroll = window.scrollY;

  if (currentScroll > 50) {
    nav.classList.add("scrolled");
  } else {
    nav.classList.remove("scrolled");
  }

  if (currentScroll > lastScroll && currentScroll > 80) {
    nav.classList.add("hide");
  } else {
    nav.classList.remove("hide");
  }

  lastScroll = currentScroll;
});

hamburger.addEventListener("click", () => {
  hamburger.classList.toggle("active");
  menu.classList.toggle("show");
});
</script>

</body>
</html>
