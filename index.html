<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiVaRiX</title>

<link rel="icon" href="https://commons.wikimedia.org/wiki/Special:FilePath/HiVaRiX.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --brand:#003366;
  --accent:#ffd700;
}

/* BASE */
body{
  margin:0;
  font-family:'Segoe UI', system-ui, sans-serif;
  background:#f6f8fc;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 24px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(10px);
  z-index:1000;
}

nav img{height:60px;}

.menu{
  display:flex;
  gap:20px;
}

.menu a{
  text-decoration:none;
  color:#003366;
  font-weight:600;
  position:relative;
}

.menu a::after{
  content:"";
  position:absolute;
  width:0;
  height:2px;
  left:0;
  bottom:-5px;
  background:#ffd700;
  transition:0.3s;
}

.menu a:hover::after{
  width:100%;
}

/* HAMBURGER */
.hamburger{
  display:none;
  flex-direction:column;
  gap:5px;
  cursor:pointer;
}

.hamburger span{
  width:25px;
  height:3px;
  background:#003366;
  transition:0.3s;
}

/* HERO */
header{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.4)),
    url('https://images.unsplash.com/photo-1552664730-d307ca884978') center/cover;
}

h1{font-size:60px;}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:14px 28px;
  border-radius:30px;
  text-decoration:none;
  font-weight:600;
}

.btn-primary{
  background:#ffd700;
  color:#000;
}

.btn-outline{
  border:2px solid #fff;
  color:#fff;
  margin-left:10px;
}

/* MOBILE */
@media(max-width:768px){

  .hamburger{
    display:flex;
  }

  .menu{
    position:absolute;
    top:80px;
    right:20px;
    background:#fff;
    flex-direction:column;
    width:200px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 15px 35px rgba(0,0,0,0.1);

    opacity:0;
    transform:translateY(-10px);
    pointer-events:none;
  }

  .menu.show{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }

  .menu a{
    margin:10px 0;
  }
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="/">
    <img src="https://commons.wikimedia.org/wiki/Special:FilePath/HiVaRiX.png">
  </a>

  <!-- Hamburger -->
  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- MENU -->
  <div class="menu" id="menu">
    <a href="/">Home</a>
    <a href="https://hivarix.com/services">Services</a>
    <a href="https://hivarix.com/about">About</a>
  </div>
</nav>

<!-- HERO -->
<header>
  <div>
    <h1>HiVaRiX</h1>
    <p>We build world-class brands.</p>

    <a href="https://hivarix.com/services" class="btn btn-primary">Start a Project</a>
    <a href="https://hivarix.com/services" class="btn btn-outline">View Services</a>
  </div>
</header>

<!-- SCRIPT -->
<script>
const hamburger = document.getElementById("hamburger");
const menu = document.getElementById("menu");

hamburger.addEventListener("click", () => {
  hamburger.classList.toggle("active");
  menu.classList.toggle("show");
});
</script>

</body>
</html>
