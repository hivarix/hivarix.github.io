<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiVaRiX</title>

<link rel="icon" href="https://commons.wikimedia.org/wiki/Special:FilePath/HiVaRiX.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --brand:#003366;
  --accent:#ffd700;
  --text:#1b1b1b;
  --muted:rgba(0,0,0,0.6);
}

/* BASE */
body{
  margin:0;
  font-family:'Segoe UI', system-ui, sans-serif;
  background:#f6f8fc;
  color:var(--text);
  scroll-behavior:smooth;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 24px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(0,0,0,0.06);
}

nav img{
  height:68px;
}

/* MENU */
.menu{
  display:flex;
  align-items:center;
}

.menu a{
  margin:0 12px;
  text-decoration:none;
  color:var(--brand);
  font-weight:600;
  position:relative;
}

.menu a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-5px;
  width:0;
  height:2px;
  background:var(--accent);
  transition:0.3s;
}

.menu a:hover::after{
  width:100%;
}

/* HAMBURGER */
.hamburger{
  display:none;
  flex-direction:column;
  cursor:pointer;
  gap:5px;
}

.hamburger span{
  width:26px;
  height:3px;
  background:var(--brand);
  border-radius:3px;
}

/* HERO */
header{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.8), transparent 60%),
    linear-gradient(120deg, rgba(0,0,0,0.75), rgba(0,0,0,0.35)),
    url('https://images.unsplash.com/photo-1552664730-d307ca884978') center/cover;
  color:#fff;
}

.hero{
  max-width:850px;
}

h1{
  font-size:64px;
  margin:0;
}

p{
  font-size:18px;
}

.btn{
  display:inline-block;
  margin-top:22px;
  padding:14px 28px;
  border-radius:30px;
  font-weight:600;
  text-decoration:none;
}

.btn-primary{
  background:var(--accent);
  color:#111;
}

.btn-outline{
  border:2px solid #fff;
  color:#fff;
  margin-left:10px;
}

/* SECTION */
section{
  padding:90px 20px;
  text-align:center;
}

h2{
  font-size:36px;
  color:var(--brand);
}

.sub{
  color:var(--muted);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:#fff;
  padding:28px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

/* CTA */
.cta{
  background:linear-gradient(135deg,var(--brand),#001a33);
  color:#fff;
}

/* FOOTER */
footer{
  background:#081523;
  color:#fff;
  text-align:center;
  padding:60px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

footer img{
  height:70px;
}

.socials a{
  color:#fff;
  margin:0 10px;
}

/* MOBILE */
@media(max-width:768px){

  .hamburger{
    display:flex;
  }

  .menu{
    position:absolute;
    top:80px;
    right:20px;
    background:#fff;
    flex-direction:column;
    width:220px;
    padding:20px;
    border-radius:12px;
    box-shadow:0 20px 40px rgba(0,0,0,0.1);

    opacity:0;
    transform:translateY(-10px);
    pointer-events:none;
    transition:0.3s;
  }

  .menu.show{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }

  .menu a{
    margin:10px 0;
  }

  h1{font-size:40px;}
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="/">
    <img src="https://commons.wikimedia.org/wiki/Special:FilePath/HiVaRiX.png">
  </a>

  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="menu" id="menu">
    <a href="/">Home</a>
    <a href="https://hivarix.com/services">Services</a>
    <a href="https://hivarix.com/about">About</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<header>
  <div class="hero">
    <h1>HiVaRiX</h1>
    <p>We build world-class brand identities and digital experiences.</p>

    <a href="https://hivarix.com/services" class="btn btn-primary">Start a Project</a>
    <a href="https://hivarix.com/services" class="btn btn-outline">View Services</a>
  </div>
</header>

<!-- SERVICES -->
<section>
  <h2>Our Services</h2>
  <p class="sub">Everything you need to build and scale.</p>

  <div class="grid">
    <div class="card"><h3>Brand Identity</h3></div>
    <div class="card"><h3>Web Design</h3></div>
    <div class="card"><h3>Marketing</h3></div>
    <div class="card"><h3>Startup Launch</h3></div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <img src="https://commons.wikimedia.org/wiki/Special:FilePath/HiVaRiX.png">

  <div class="socials">
    <a href="#"><i class="fab fa-facebook-f"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
  </div>

  <p>© 2026 HiVaRiX Global</p>
</footer>

<!-- SCRIPT -->
<script>
const hamburger = document.getElementById("hamburger");
const menu = document.getElementById("menu");

hamburger.addEventListener("click", () => {
  menu.classList.toggle("show");
});
</script>

</body>
</html>
