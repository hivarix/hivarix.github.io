<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiVaRiX Portfolio</title>

<link rel="icon" href="/assets/images/HiVaRiX.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --brand:#003366;
  --accent:#d4af37; /* luxury gold */
  --text:#1b1b1b;
}

/* BASE */
body{
  margin:0;
  font-family:'Segoe UI', system-ui, sans-serif;
  background:#f6f8fc;
  color:var(--text);
}

/* NAV (LUXURY MATCH) */
nav{
  position:sticky;
  top:10px;
  z-index:1000;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 40px;
  margin:10px auto;
  max-width:1200px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(18px);
  border-radius:12px;
  border:1px solid rgba(0,0,0,0.05);
}

nav img{
  height:60px;
}

.menu{
  display:flex;
  gap:28px;
}

.menu a{
  position:relative;
  text-decoration:none;
  color:var(--brand);
  font-weight:600;
  font-size:14px;
  letter-spacing:0.5px;
  transition:all 0.4s ease;
}

.menu a:hover{
  color:var(--accent);
}

.menu a::after{
  content:"";
  position:absolute;
  left:50%;
  bottom:-6px;
  width:0;
  height:2px;
  background:var(--accent);
  transition:all 0.4s ease;
  transform:translateX(-50%);
}

.menu a:hover::after{
  width:70%;
}

.menu a.active{
  color:var(--accent);
}

.menu a.active::after{
  width:70%;
}

/* HERO */
header{
  padding:120px 20px 100px;
  text-align:center;
  background:
    linear-gradient(120deg, rgba(0,0,0,0.75), rgba(0,0,0,0.35)),
    url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d') center/cover;
  color:#fff;
}

header h1{
  font-size:56px;
  margin-bottom:10px;
  letter-spacing:1px;
}

header p{
  max-width:700px;
  margin:auto;
  opacity:0.9;
  line-height:1.6;
}

/* FILTER */
.filters{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
  margin:50px 0;
}

.filters button{
  padding:10px 20px;
  border-radius:30px;
  cursor:pointer;
  background:#fff;
  border:1px solid rgba(0,0,0,0.08);
  font-weight:600;
  transition:all 0.3s ease;
}

.filters button:hover{
  background:var(--accent);
  color:#000;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
  max-width:1100px;
  margin:auto;
  padding:0 20px 100px;
}

.card{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 12px 30px rgba(0,0,0,0.06);
  transition:all 0.4s ease;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{
  padding:20px;
}

.card-content h3{
  margin:0;
  color:var(--brand);
}

/* FOOTER (LUXURY) */
footer{
  background:#050505;
  color:#888;
  text-align:center;
  padding:70px 20px;
}

footer img{
  height:65px;
  margin-bottom:20px;
}

.socials a{
  margin:0 12px;
  font-size:18px;
  color:#666;
  transition:all 0.4s ease;
}

.socials a:hover{
  color:var(--accent);
  text-shadow:0 0 8px rgba(212,175,55,0.4);
}

footer p{
  margin-top:30px;
  font-size:13px;
  color:#555;
}

/* MOBILE */
@media(max-width:768px){
  header h1{font-size:36px;}
  nav{padding:12px 20px;}
  .menu{display:none;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="/index.html">
    <img src="/assets/images/HiVaRiX.png">
  </a>

  <div class="menu">
    <a href="/index.html">Home</a>
    <a href="/services.html">Services</a>
    <a href="/portfolio.html" class="active">Portfolio</a>
  </div>
</nav>

<!-- HERO -->
<header>
  <h1>Our Portfolio</h1>
  <p>Explore world-class branding, websites, and digital experiences built by HiVaRiX for global clients.</p>
</header>

<!-- FILTER -->
<div class="filters">
  <button>All</button>
  <button>Branding</button>
  <button>Web Design</button>
  <button>Marketing</button>
  <button>UI/UX</button>
</div>

<!-- GRID -->
<section class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
    <div class="card-content">
      <h3>Elite Brand Identity</h3>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d">
    <div class="card-content">
      <h3>Corporate Website UI</h3>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71">
    <div class="card-content">
      <h3>Growth Marketing Campaign</h3>
    </div>
  </div>

</section>

<!-- FOOTER -->
<footer>

  <img src="/assets/images/HiVaRiX.png">

  <div class="socials">
    <a href="https://facebook.com/hivarix"><i class="fab fa-facebook-f"></i></a>
    <a href="https://instagram.com/hivarix"><i class="fab fa-instagram"></i></a>
    <a href="https://x.com/hivarix"><i class="fab fa-x-twitter"></i></a>
    <a href="https://tiktok.com/@hivarix"><i class="fab fa-tiktok"></i></a>
    <a href="https://youtube.com/@hivarix"><i class="fab fa-youtube"></i></a>
  </div>

  <p>© 2026 HiVaRiX Global. All rights reserved.</p>

</footer>

</body>
</html>
