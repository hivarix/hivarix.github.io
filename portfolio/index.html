<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiVaRiX Portfolio</title>

<!-- Favicon (same as homepage) -->
<link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon/favicon-16.png">
<link rel="apple-touch-icon" href="/assets/images/favicon/apple-touch-icon.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --brand:#003366;
  --accent:#ffd700;
  --text:#1b1b1b;
}

/* BASE */
body{
  margin:0;
  font-family:'Segoe UI', system-ui, sans-serif;
  background:#f6f8fc;
  color:var(--text);
}

/* NAV (MATCHES HOMEPAGE EXACTLY) */
nav{
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(0,0,0,0.06);
}

nav img{
  height:60px;
}

.menu{
  display:flex;
  align-items:center;
  gap:16px;
}

.menu a{
  text-decoration:none;
  color:var(--brand);
  font-weight:600;
  font-size:14px;
  position:relative;
}

/* underline hover */
.menu a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-4px;
  width:0;
  height:2px;
  background:var(--accent);
  transition:0.3s;
}

.menu a:hover::after{
  width:100%;
}

/* CTA button */
.nav-cta{
  background:var(--accent);
  padding:6px 14px;
  border-radius:20px;
  color:#000 !important;
}

/* HERO */
header{
  padding:120px 20px 80px; /* prevents nav overlap */
  text-align:center;
  background:
    linear-gradient(120deg, rgba(0,0,0,0.75), rgba(0,0,0,0.35)),
    url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d') center/cover;
  color:#fff;
}

header h1{
  font-size:50px;
  margin-bottom:10px;
}

header p{
  max-width:700px;
  margin:auto;
  line-height:1.6;
}

/* FILTER */
.filters{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin:40px 0;
}

.filters button{
  padding:10px 18px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:#fff;
  border:1px solid rgba(0,0,0,0.1);
  font-weight:600;
}

.filters button:hover{
  background:var(--accent);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  max-width:1100px;
  margin:auto;
  padding:0 20px 80px;
}

.card{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{
  padding:18px;
}

.card-content h3{
  margin:0;
  color:var(--brand);
}

/* FOOTER (MATCH HOMEPAGE STYLE) */
footer{
  background:#081523;
  color:#fff;
  text-align:center;
  padding:60px 20px;
}

footer img{
  height:70px;
  margin-bottom:15px;
}

.socials a{
  color:#fff;
  margin:0 10px;
  font-size:20px;
}

.socials a:hover{
  color:var(--accent);
}

footer p{
  font-size:13px;
  opacity:0.8;
}

/* MOBILE */
@media(max-width:768px){
  header h1{font-size:34px;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="/">
    <img src="/assets/images/HiVaRiX.png">
  </a>

  <div class="menu">
    <a href="/">Home</a>
    <a href="/services/">Services</a>
    <a href="/about/">About</a>
    <a href="/#contact" class="nav-cta">Start</a>
  </div>
</nav>

<!-- HERO -->
<header>
  <h1>Our Portfolio</h1>
  <p>Explore world-class branding, websites, and digital experiences built by HiVaRiX for global clients.</p>
</header>

<!-- FILTER -->
<div class="filters">
  <button>All</button>
  <button>Branding</button>
  <button>Web Design</button>
  <button>Marketing</button>
  <button>UI/UX</button>
</div>

<!-- GRID -->
<section class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
    <div class="card-content">
      <h3>Elite Brand Identity</h3>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d">
    <div class="card-content">
      <h3>Corporate Website UI</h3>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71">
    <div class="card-content">
      <h3>Growth Marketing Campaign</h3>
    </div>
  </div>

</section>

<!-- FOOTER -->
<footer>

  <img src="/assets/images/HiVaRiX.png">

  <div class="socials">
    <a href="https://facebook.com/hivarix"><i class="fab fa-facebook-f"></i></a>
    <a href="https://instagram.com/hivarix"><i class="fab fa-instagram"></i></a>
    <a href="https://x.com/hivarix"><i class="fab fa-x-twitter"></i></a>
    <a href="https://tiktok.com/@hivarix"><i class="fab fa-tiktok"></i></a>
    <a href="https://youtube.com/@hivarix"><i class="fab fa-youtube"></i></a>
  </div>

  <p>© 2026 HiVaRiX Global. All rights reserved.</p>

</footer>

</body>
</html>
