<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Identity | HiVaRiX</title>

<link rel="icon" href="../../assets/images/HiVaRiX.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --brand:#003366;
  --accent:#ffd700;
}

/* BASE */
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f6f8fc;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:14px 24px;
  display:flex;
  justify-content:space-between;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(12px);
}
nav img{height:60px;}

/* HERO */
header{
  padding:140px 20px;
  text-align:center;
  background:linear-gradient(120deg,#001a33,#003366);
  color:#fff;
}

header h1{font-size:48px;margin:0;}

/* SECTION */
section{
  padding:80px 20px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  max-width:1100px;
  margin:auto;
}

/* CARD */
.card{
  background:#fff;
  padding:28px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
}

.card i{
  font-size:28px;
  color:var(--accent);
  margin-bottom:12px;
}

/* PROCESS */
.steps{
  display:grid;
  gap:20px;
  max-width:700px;
  margin:auto;
}

.step{
  background:#fff;
  padding:20px;
  border-radius:12px;
}

/* CTA */
.cta{
  background:#001a33;
  color:#fff;
}

.btn{
  background:var(--accent);
  padding:12px 24px;
  border-radius:30px;
  text-decoration:none;
  color:#000;
  display:inline-block;
  margin-top:20px;
}

/* ANIMATION */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:0.8s;
}

.reveal.active{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<nav>
  <a href="/"><img src="../../assets/images/HiVaRiX.png"></a>
</nav>

<header>
  <h1>Brand Identity</h1>
  <p>We craft brands that stand out globally.</p>
</header>

<section>
  <h2>What You Get</h2>
  <div class="grid">
    <div class="card reveal"><i class="fas fa-pen-nib"></i><h3>Logo Design</h3></div>
    <div class="card reveal"><i class="fas fa-palette"></i><h3>Visual Identity</h3></div>
    <div class="card reveal"><i class="fas fa-bullseye"></i><h3>Brand Strategy</h3></div>
  </div>
</section>

<section>
  <h2>Our Process</h2>
  <div class="steps">
    <div class="step reveal">1. Research & Discovery</div>
    <div class="step reveal">2. Concept Development</div>
    <div class="step reveal">3. Design Execution</div>
    <div class="step reveal">4. Final Delivery</div>
  </div>
</section>

<section class="cta">
  <h2>Ready to Build Your Brand?</h2>
  <a href="/#contact" class="btn">Start a Project</a>
</section>

<script>
document.addEventListener("scroll",()=>{
 document.querySelectorAll(".reveal").forEach(el=>{
  if(el.getBoundingClientRect().top < window.innerHeight-80){
    el.classList.add("active");
  }
 });
});
</script>

</body>
</html>
