<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Identity | HiVaRiX</title>
<link rel="icon" href="../../assets/images/HiVaRiX.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f6f8fc;}
nav{position:fixed;width:100%;padding:14px 24px;background:#fff;}
header{padding:140px 20px;text-align:center;background:#003366;color:#fff;}
section{padding:80px 20px;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;max-width:1000px;margin:auto;}
.card{background:#fff;padding:25px;border-radius:14px;box-shadow:0 10px 25px rgba(0,0,0,0.05);}
.cta{background:#001a33;color:#fff;padding:60px;}
.btn{background:#ffd700;padding:12px 24px;border-radius:30px;text-decoration:none;color:#000;}
</style>
</head>

<body>

<header>
  <h1>Brand Identity</h1>
  <p>We create powerful brand systems that define your presence globally.</p>
</header>

<section>
  <h2>What We Offer</h2>
  <div class="grid">
    <div class="card"><h3>Logo Design</h3><p>Memorable and timeless logos.</p></div>
    <div class="card"><h3>Visual Systems</h3><p>Colors, typography & consistency.</p></div>
    <div class="card"><h3>Brand Strategy</h3><p>Positioning that wins markets.</p></div>
  </div>
</section>

<section class="cta">
  <h2>Ready to Build Your Brand?</h2>
  <a href="/#contact" class="btn">Start a Project</a>
</section>

</body>
</html>
