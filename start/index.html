<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start a Project • HiVaRiX</title>
    <link rel="icon" href="/assets/images/HiVaRiX.png">

    <style>
        :root {
            --brand: #003366;
            --accent: #ffd700;
            --muted: rgba(0, 0, 0, 0.6);
            --bg: #f6f8fc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: #111;
            line-height: 1.5;
        }

        .top-space { height: 90px; }

        .progress {
            max-width: 600px;
            margin: 20px auto 0;
            padding: 0 20px;
        }

        .progress-bar {
            height: 6px;
            background: #e5e5e5;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.4s ease;
        }

        .hero {
            text-align: center;
            padding: 30px 20px 10px;
        }

        .hero h1 {
            color: var(--brand);
            font-size: 32px;
        }

        .hero p {
            color: var(--muted);
            margin-top: 6px;
        }

        .wrapper {
            max-width: 600px;
            margin: 20px auto 80px;
            background: #fff;
            border-radius: 18px;
            padding: 26px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.06);
        }

        .step { display: none; animation: fade 0.4s ease forwards; }
        .step.active { display: block; }

        @keyframes fade {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        h2 { color: var(--brand); margin-bottom: 12px; }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }

        .buttons {
            margin-top: 22px;
            display: flex;
            justify-content: space-between;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .next { background: var(--accent); }
        .prev { background: #eee; }

        .price-box {
            margin-top: 18px;
            padding: 16px;
            background: #f7f9fc;
            border-radius: 12px;
            text-align: center;
        }

        .price {
            font-size: 26px;
            font-weight: 700;
            color: var(--brand);
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div id="header"></div>

<div class="top-space"></div>

<div class="progress">
    <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
    </div>
</div>

<div class="hero">
    <h1>Start Your Project</h1>
    <p>Complete a few steps and get your estimate instantly</p>
</div>

<div class="wrapper">
<form action="https://formspree.io/f/mnjldqow" method="POST">

    <div class="step active">
        <h2>Your Info</h2>
        <input type="text" name="name" required>
        <input type="email" name="email" required>
    </div>

    <div class="step">
        <h2>Select Service</h2>
        <select id="service" name="service">
            <option value="300">Branding ($300)</option>
            <option value="500">Web Development ($500)</option>
            <option value="400">Marketing ($400)</option>
            <option value="700">Full Package ($700)</option>
        </select>
    </div>

    <div class="step">
        <h2>Project Details</h2>
        <textarea name="message"></textarea>

        <div class="price-box">
            <p>Estimated Cost</p>
            <div class="price" id="price">$300</div>
        </div>
    </div>

    <div class="step">
        <h2>Review & Submit</h2>
        <button type="submit">Submit Request</button>
    </div>

    <div class="buttons">
        <button type="button" onclick="prevStep()">Back</button>
        <button type="button" id="nextBtn" onclick="nextStep()">Next</button>
    </div>

</form>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- INCLUDE SCRIPT -->
<script src="/assets/js/include.js"></script>

<!-- FORM LOGIC -->
<script>
let currentStep = 0;

function initOnboarding() {
    const steps = document.querySelectorAll(".step");
    const progressFill = document.getElementById("progress");
    const nextBtn = document.getElementById("nextBtn");

    function updateUI() {
        steps.forEach((step, i) => {
            step.classList.toggle("active", i === currentStep);
        });

        progressFill.style.width =
            (currentStep / (steps.length - 1)) * 100 + "%";

        nextBtn.style.display =
            currentStep === steps.length - 1 ? "none" : "inline-block";
    }

    window.nextStep = () => {
        if (currentStep < steps.length - 1) {
            currentStep++;
            updateUI();
        }
    };

    window.prevStep = () => {
        if (currentStep > 0) {
            currentStep--;
            updateUI();
        }
    };

    const service = document.getElementById("service");
    const price = document.getElementById("price");

    service.addEventListener("change", () => {
        price.textContent = "$" + service.value;
    });

    updateUI();
}

document.addEventListener("DOMContentLoaded", initOnboarding);
</script>

</body>
</html>
