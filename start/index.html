<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start a Project • HiVaRiX</title>

<link rel="icon" href="/assets/images/HiVaRiX.png">

<style>
:root{
  --brand:#003366;
  --accent:#ffd700;
  --text:#1b1b1b;
  --muted:rgba(0,0,0,0.6);
}

/* BASE */
{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Segoe UI', system-ui, sans-serif;
  background:#f6f8fc;
  color:var(--text);
}

/ HEADER SPACE (because nav is fixed) /
.top-space{
  height:90px;
}

/ HERO /
.hero{
  text-align:center;
  padding:40px 20px 20px;
}

.hero h1{
  font-size:36px;
  margin-bottom:10px;
  color:var(--brand);
}

.hero p{
  color:var(--muted);
}

/ WRAPPER /
.wrapper{
  max-width:600px;
  margin:30px auto 80px;
  background:#fff;
  padding:24px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

/ STEPS /
.step{display:none;}
.step.active{display:block;}

h2{
  color:var(--brand);
}

/ INPUTS /
input, select, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,0.1);
  font-size:14px;
}

/ BUTTONS /
.buttons{
  margin-top:20px;
  display:flex;
  justify-content:space-between;
  gap:10px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:600;
}

/ MATCH SITE BUTTON STYLE /
.next{
  background:var(--accent);
  color:#111;
}

.prev{
  background:#eee;
}

/ PRICE BOX /
.price-box{
  margin-top:20px;
  padding:18px;
  background:#f6f8fc;
  border-radius:12px;
  text-align:center;
}

.price{
  font-size:26px;
  font-weight:bold;
  color:var(--brand);
}

/ MOBILE /
@media(max-width:768px){
  .wrapper{
    margin:20px;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div id="header"></div>

<div class="top-space"></div>

<!-- HERO -->
<div class="hero">
  <h1>Start Your Project</h1>
  <p>Tell us what you need and get a quick estimate</p>
</div>

<!-- FORM -->
<div class="wrapper">

<form action="https://formspree.io/f/YOUR_ID" method="POST">

<!-- STEP 1 -->
<div class="step active">
  <h2>Your Info</h2>
  <input type="text" name="name" placeholder="Full Name" required>
  <input type="email" name="email" placeholder="Email Address" required>
</div>

<!-- STEP 2 -->
<div class="step">
  <h2>Select Service</h2>
  <select name="service" id="service">
    <option value="300">Branding ($300)</option>
    <option value="500">Web Development ($500)</option>
    <option value="400">Marketing ($400)</option>
    <option value="700">Full Package ($700)</option>
  </select>
</div>

<!-- STEP 3 -->
<div class="step">
  <h2>Project Details</h2>
  <textarea name="message" placeholder="Describe your project"></textarea>

  <div class="price-box">
    <p>Estimated Cost</p>
    <div class="price" id="price">$300</div>
  </div>
</div>

<!-- STEP 4 -->
<div class="step">
  <h2>Confirm & Submit</h2>
  <p>Click submit and we’ll get back to you shortly.</p>
  <button type="submit" class="next">Submit Request</button>
</div>

<div class="buttons">
  <button type="button" class="prev" onclick="prevStep()">Back</button>
  <button type="button" class="next" onclick="nextStep()">Next</button>
</div>

</form>

</div>

<!-- FOOTER -->
<div id="footer"></div>

<script src="/assets/js/include.js"></script>

<script>
let step = 0;
const steps = document.querySelectorAll(".step");

function showStep(){
  steps.forEach((s,i)=>{
    s.classList.toggle("active", i === step);
  });
}

function nextStep(){
  if(step < steps.length - 1){
    step++;
    showStep();
  }
}

function prevStep(){
  if(step > 0){
    step--;
    showStep();
  }
}

/ PRICE */
const service = document.getElementById("service");
const price = document.getElementById("price");

service.addEventListener("change", ()=>{
  price.textContent = "$" + service.value;
});
</script>

</body>
</html>
