<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start a Project • HiVaRiX</title>
    <link rel="icon" href="/assets/images/HiVaRiX.png">

    <<link rel="icon" href="../../assets/images/HiVaRiX.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --brand:#003366;
  --accent:#ffd700;
  --text:#1b1b1b;
  --muted:rgba(0,0,0,0.6);
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Segoe UI', system-ui, sans-serif;
  background:#f6f8fc;
  color:var(--text);
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(0,0,0,0.06);
}

nav img{height:60px;}

.menu{
  display:flex;
  align-items:center;
  gap:16px;
}

.menu a{
  text-decoration:none;
  color:var(--brand);
  font-weight:600;
  font-size:14px;
}

.menu a.active{color:var(--accent);}

.nav-cta{
  background:var(--accent);
  padding:6px 14px;
  border-radius:20px;
  color:#000 !important;
}

/* HERO */
header{
  padding:120px 20px 60px;
  text-align:center;
}

header h1{
  font-size:42px;
  margin-bottom:10px;
}

header p{
  max-width:650px;
  margin:auto;
  color:var(--muted);
}
</head>
<body>

<div class="top-space"></div>

<div class="progress">
    <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
    </div>
</div>

<div class="hero">
    <h1>Start Your Project</h1>
    <p>Complete a few steps and get your estimate instantly</p>
</div>

<div class="wrapper">
<form action="https://formspree.io/f/mnjldqow" method="POST">

    <div class="step active">
        <h2>Your Info</h2>
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
    </div>

    <div class="step">
        <h2>Select Service</h2>
        <select id="service" name="service">
            <option value="300">Branding ($300)</option>
            <option value="500">Web Development ($500)</option>
            <option value="400">Marketing ($400)</option>
            <option value="700">Full Package ($700)</option>
        </select>
    </div>

    <div class="step">
        <h2>Project Details</h2>
        <textarea name="message" placeholder="Describe your project" rows="5"></textarea>

        <div class="price-box">
            <p>Estimated Cost</p>
            <div class="price" id="price">$300</div>
        </div>
    </div>

    <div class="step">
        <h2>Review & Submit</h2>
        <p>Everything looks good? Submit your request.</p>
        <button type="submit" class="next">Submit Request</button>
    </div>

    <div class="buttons">
        <button type="button" class="prev" onclick="prevStep()">Back</button>
        <button type="button" class="next" id="nextBtn" onclick="nextStep()">Next</button>
    </div>

</form>
</div>

<script>
let currentStep = 0;

function initOnboarding() {
    const steps = document.querySelectorAll(".step");
    const progressFill = document.getElementById("progress");
    const nextBtn = document.getElementById("nextBtn");

    function updateUI() {
        steps.forEach((step, index) => {
            step.classList.toggle("active", index === currentStep);
        });

        const progressPercent = (currentStep / (steps.length - 1)) * 100;
        progressFill.style.width = progressPercent + "%";

        nextBtn.style.display = (currentStep === steps.length - 1) ? "none" : "inline-block";
    }

    window.nextStep = function () {
        if (currentStep < steps.length - 1) {
            currentStep++;
            updateUI();
        }
    };

    window.prevStep = function () {
        if (currentStep > 0) {
            currentStep--;
            updateUI();
        }
    };

    const serviceSelect = document.getElementById("service");
    const priceDisplay = document.getElementById("price");

    serviceSelect.addEventListener("change", () => {
        priceDisplay.textContent = "$" + serviceSelect.value;
    });

    updateUI();
}

document.addEventListener("DOMContentLoaded", initOnboarding);
</script>

</body>
</html>
